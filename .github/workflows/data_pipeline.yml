name: Collect Smart City Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  collect-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install -r requirements.txt
      - name: Run data collection script
        env:
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          SUPABASE_CONNECTION_STRING: ${{ secrets.SUPABASE_CONNECTION_STRING }}
        run: python collect_data.py
      - name: Commit and push heartbeat
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "Last successful collection: $(date)" > heartbeat.txt
          git add heartbeat.txt
          git commit -m "Pipeline Heartbeat: $(date)" || echo "No changes to commit"
          git push
